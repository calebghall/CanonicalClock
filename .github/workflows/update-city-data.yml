name: Update City Data

on:
  schedule:
    - cron: '0 0 1 * *' # Runs at midnight on the 1st of every month
  workflow_dispatch:      # Allows you to run it manually with a button click

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Download latest GeoNames data
        run: |
          set -e

          wget http://download.geonames.org/export/dump/cities500.zip

          if [ ! -s cities500.zip ]; then
            echo "Error: Downloaded file is empty or missing."
            exit 1
          fi

          unzip cities500.zip
          
          if [ ! -f cities500.txt ]; then
            echo "Error: cities500.txt not found after unzip."
            exit 1
          fi

      - name: Run Compression Script
        run: python citydata/cityDataCompress.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Automated city data update"
          branch: city-data-update
          title: "Monthly City Data Update"
          body: "Automated update from GeoNames. Please review before merging."
          add-paths: citydata/*.json
